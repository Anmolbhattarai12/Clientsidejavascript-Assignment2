<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pizza Maker</title>

    <!-- Css file-->
    <link rel="stylesheet" href="css/styles.css">

    <!-- JavaScript file -->
    <script src="js/script.js" defer></script>
</head>

<body>
    <main>
        <h1>The Pizza Maker</h1>

        <!-- Pizza image -->
        <img src="img/pizza.jpg" alt="Pizza image" class="pizza-photo">

        <!-- Student information -->
        <p id="studentInfo"></p>

        <section>
            <h2>Order Your Pizza</h2>

            <form id="pizzaForm">
                <label for="customerName">Customer Name:</label>
                <input type="text" id="customerName" required>

                <label for="pizzaSize">Pizza Size:</label>
                <select id="pizzaSize" required>
                    <option value="">Select a size</option>
                    <option value="Small">Small</option>
                    <option value="Medium">Medium</option>
                    <option value="Large">Large</option>
                </select>

                <label for="crustType">Crust Type:</label>
                <select id="crustType" required>
                    <option value="">Select a crust</option>
                    <option value="Thin Crust">Thin Crust</option>
                    <option value="Regular Crust">Regular Crust</option>
                    <option value="Stuffed Crust">Stuffed Crust</option>
                </select>

                <label for="sauceType">Sauce Type:</label>
                <select id="sauceType" required>
                    <option value="">Select a sauce</option>
                    <option value="Tomato Sauce">Tomato Sauce</option>
                    <option value="BBQ Sauce">BBQ Sauce</option>
                    <option value="Garlic Sauce">Garlic Sauce</option>
                </select>

                <fieldset>
                    <legend>Cheese:</legend>

                    <label>
                        <input type="radio" name="cheese" value="Regular Cheese" required>
                        Regular Cheese
                    </label>

                    <label>
                        <input type="radio" name="cheese" value="Extra Cheese">
                        Extra Cheese
                    </label>
                </fieldset>

                <fieldset>
                    <legend>Toppings:</legend>

                    <label>
                        <input type="checkbox" name="toppings" value="Pepperoni">
                        Pepperoni
                    </label>

                    <label>
                        <input type="checkbox" name="toppings" value="Mushrooms">
                        Mushrooms
                    </label>

                    <label>
                        <input type="checkbox" name="toppings" value="Green Peppers">
                        Green Peppers
                    </label>
                </fieldset>

                <label for="instructions">Special Instructions:</label>
                <textarea id="instructions" placeholder="Write any special instructions here"></textarea>

                <button type="submit">Order Pizza</button>
            </form>
        </section>

        <section>
            <h2>Your Pizza Order</h2>
            <p id="orderOutput"></p>
        </section>
    </main>
</body>

</html>
